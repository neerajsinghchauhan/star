<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0A3B"/>
      <stop offset="100%" stop-color="#0D061F"/>
    </linearGradient>
    <linearGradient id="star-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="7" fill="url(#bg-grad)"/>

  <!-- Subtle inner glow -->
  <rect width="32" height="32" rx="7" fill="none" stroke="#7C3AED" stroke-width="0.5" opacity="0.5"/>

  <!-- 4-pointed star shape - crisp and geometric -->
  <path
    d="M16 3.5
       C16 3.5 17.2 10.8 19.5 13.1
       C21.8 15.4 29 16 29 16
       C29 16 21.8 16.6 19.5 18.9
       C17.2 21.2 16 28.5 16 28.5
       C16 28.5 14.8 21.2 12.5 18.9
       C10.2 16.6 3 16 3 16
       C3 16 10.2 15.4 12.5 13.1
       C14.8 10.8 16 3.5 16 3.5Z"
    fill="url(#star-grad)"
    filter="url(#glow)"
  />

  <!-- Small center dot highlight -->
  <circle cx="16" cy="16" r="1.5" fill="#E9D5FF" opacity="0.9"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Deep space background gradient -->
    <radialGradient id="bg-radial" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#1E0A4E"/>
      <stop offset="50%" stop-color="#0D0520"/>
      <stop offset="100%" stop-color="#050210"/>
    </radialGradient>

    <!-- Main star gradient - purple to cyan -->
    <linearGradient id="star-main" x1="10%" y1="5%" x2="90%" y2="95%">
      <stop offset="0%" stop-color="#67E8F9"/>
      <stop offset="35%" stop-color="#A78BFA"/>
      <stop offset="70%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>

    <!-- Inner star highlight -->
    <linearGradient id="star-inner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0ABFC"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>

    <!-- Ring gradient -->
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#67E8F9" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#A78BFA" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.6"/>
    </linearGradient>

    <!-- Clip for rounded square -->
    <clipPath id="rounded-clip">
      <rect width="512" height="512" rx="110"/>
    </clipPath>
  </defs>

  <!-- Clip everything to rounded square -->
  <g clip-path="url(#rounded-clip)">
    <!-- Background -->
    <rect width="512" height="512" fill="url(#bg-radial)"/>

    <!-- Pseudo-glow: Ambient glow blob underneath star (using radial gradient) -->
    <circle cx="256" cy="256" r="160" fill="#7C3AED" opacity="0.3"/>
    <circle cx="256" cy="256" r="110" fill="#7C3AED" opacity="0.4"/>

    <!-- Subtle nebula glows -->
    <ellipse cx="120" cy="130" rx="180" ry="140" fill="#3B0764" opacity="0.4"/>
    <ellipse cx="400" cy="390" rx="160" ry="120" fill="#0E7490" opacity="0.2"/>

    <!-- Outer orbital ring - ellipse -->
    <ellipse
      cx="256" cy="256"
      rx="195" ry="75"
      fill="none"
      stroke="url(#ring-grad)"
      stroke-width="2"
      opacity="0.8"
      transform="rotate(-30 256 256)"
    />

    <!-- Second orbital ring -->
    <ellipse
      cx="256" cy="256"
      rx="155" ry="60"
      fill="none"
      stroke="#A78BFA"
      stroke-width="1.5"
      stroke-dasharray="8 12"
      opacity="0.5"
      transform="rotate(15 256 256)"
    />

    <!-- === MAIN 4-POINTED STAR === -->
    <path
      d="M256 80
         C256 80  268 155  294 181
         C320 207  396 216  432 256
         C396 256  320 296  294 331
         C268 355  256 432  256 432
         C256 432  244 355  218 331
         C192 306  116 296  80 256
         C116 256  192 207  218 181
         C244 155  256 80  256 80Z"
      fill="url(#star-main)"
    />

    <!-- Inner smaller star highlight layer -->
    <path
      d="M256 148
         C256 148  263 196  279 213
         C297 230  344 237  370 256
         C344 256  297 275  279 299
         C263 313  256 364  256 364
         C256 364  249 313  233 299
         C215 275  168 256  142 256
         C168 256  215 230  233 213
         C249 196  256 148  256 148Z"
      fill="url(#star-inner)"
      opacity="0.75"
    />

    <!-- Center bright core -->
    <circle cx="256" cy="256" r="22" fill="#F5F3FF"/>
    <circle cx="256" cy="256" r="12" fill="white"/>

    <!-- Small sparkle dots on the four star tips -->
    <circle cx="256" cy="88" r="6" fill="#67E8F9"/>
    <circle cx="256" cy="100" r="10" fill="#67E8F9" opacity="0.3"/> <!-- Fake glow -->
    
    <circle cx="256" cy="424" r="6" fill="#67E8F9"/>
    <circle cx="256" cy="412" r="10" fill="#67E8F9" opacity="0.3"/> <!-- Fake glow -->
    
    <circle cx="88" cy="256" r="6" fill="#C084FC"/>
    <circle cx="100" cy="256" r="10" fill="#C084FC" opacity="0.3"/> <!-- Fake glow -->
    
    <circle cx="424" cy="256" r="6" fill="#C084FC"/>
    <circle cx="412" cy="256" r="10" fill="#C084FC" opacity="0.3"/> <!-- Fake glow -->

    <!-- Scattered small stars / particles -->
    <circle cx="108" cy="108" r="3" fill="#E9D5FF"/>
    <circle cx="400" cy="115" r="3" fill="#BAE6FD"/>
    <circle cx="140" cy="380" r="2.5" fill="#E9D5FF"/>
    <circle cx="390" cy="370" r="3.5" fill="#C084FC"/>
    <circle cx="72" cy="200" r="2" fill="white"/>
    <circle cx="450" cy="310" r="2.5" fill="white"/>
    <circle cx="320" cy="75" r="2" fill="#A5F3FC"/>
    <circle cx="190" cy="445" r="3" fill="#DDD6FE"/>
    <circle cx="460" cy="170" r="2" fill="#F0ABFC"/>
    <circle cx="55" cy="330" r="2" fill="#A5F3FC"/>
    <circle cx="175" cy="90" r="1.5" fill="white"/>
    <circle cx="430" cy="430" r="2.5" fill="#DDD6FE"/>

    <!-- Very subtle edge vignette using stroke instead of complex drop shadows -->
    <rect width="512" height="512" rx="110" fill="none" stroke="#7C3AED" stroke-width="4" opacity="0.5"/>
  </g>
</svg>
